<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>Cifram-LAB · Gestor de Archivos</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #f4f7fb;
            min-height: 100vh;
            padding: 12px;
        }
        
        .app-container {
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(4px);
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.12);
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.5);
            display: flex;
            gap: 20px;
            position: relative;
            min-height: 600px;
        }
        
        .sidebar {
            width: 280px;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 20px 12px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.8);
            transition: all 0.3s ease;
            position: sticky;
            top: 20px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            height: fit-content;
            max-height: calc(100vh - 40px);
            overflow-y: auto;
            overflow-x: hidden;
            align-self: flex-start;
        }
        
        .sidebar.collapsed {
            width: 80px;
        }
        
        .sidebar.collapsed .tab-btn span,
        .sidebar.collapsed .user-info span,
        .sidebar.collapsed .logout-btn span,
        .sidebar.collapsed .toggle-sidebar span,
        .sidebar.collapsed .global-search-container span,
        .sidebar.collapsed .global-search-container input {
            display: none;
        }
        
        .sidebar.collapsed .tab-btn i,
        .sidebar.collapsed .toggle-sidebar i,
        .sidebar.collapsed .global-search-container i {
            font-size: 1.3rem;
            margin: 0;
        }
        
        .toggle-sidebar {
            position: sticky;
            top: 0;
            z-index: 101;
            width: 100%;
            margin-bottom: 15px;
            background: #2dba4e;
            color: white;
            border: 2px solid white;
            border-radius: 50px;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .global-search-container {
            position: relative;
            margin-bottom: 20px;
            width: 100%;
        }
        
        .global-search-input {
            width: 100%;
            padding: 12px 20px 12px 45px;
            border-radius: 50px;
            border: 2px solid #e2e8f0;
            font-size: 0.95rem;
            background: white;
        }
        
        .global-search-results {
            margin-top: 8px;
            font-size: 0.85rem;
            color: #334155;
            background: white;
            border-radius: 20px;
            padding: 10px;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .tabs-vertical {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin: 10px 0;
            flex: 1;
        }
        
        .tab-btn {
            padding: 12px 15px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.95rem;
            border: none;
            background: rgba(230, 240, 255, 0.7);
            color: #1a2639;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            text-align: left;
        }
        
        .tab-btn i {
            width: 24px;
            text-align: center;
        }
        
        .tab-btn.activa {
            background: #ffffffcc;
            box-shadow: 0 8px 18px rgba(0,0,0,0.15);
            font-weight: 700;
        }
        
        .tab-btn.config-tab {
            background: linear-gradient(145deg, #2dba4e, #1e7e34);
            color: white;
        }
        
        .tab-btn.admin-tab {
            background: linear-gradient(145deg, #8b5cf6, #6d28d9);
            color: white;
        }
        
        .user-section {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 15px;
            padding: 8px;
            background: #f1f5f9;
            border-radius: 50px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 6px;
            background: white;
            padding: 5px 12px;
            border-radius: 40px;
            flex: 1;
            font-size: 0.9rem;
        }
        
        .logout-btn {
            background: transparent;
            border: 2px solid #ef4444;
            color: #ef4444;
            padding: 8px 12px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            width: 100%;
            margin-top: auto;
        }
        
        .main-content {
            flex: 1;
            min-width: 0;
            overflow-x: hidden;
        }
        
        .search-container {
            margin-bottom: 15px;
            position: relative;
        }
        
        .search-input {
            width: 100%;
            padding: 14px 20px 14px 50px;
            border-radius: 50px;
            border: 2px solid #e2e8f0;
            font-size: 1rem;
            background: white;
        }
        
        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }
        
        .clear-search {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            display: none;
        }
        
        .search-stats {
            margin-top: 6px;
            font-size: 0.85rem;
            color: #64748b;
            padding-left: 10px;
        }
        
        .current-tab-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #2dba4e;
            display: inline-block;
        }
        
        .sub-tabs-horizontal {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 15px 0 20px 0;
            padding: 5px;
            background: rgba(255,255,255,0.5);
            border-radius: 50px;
        }
        
        .sub-tab-horizontal-btn {
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            border: none;
            background: rgba(255,255,255,0.7);
            color: #334155;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .sub-tab-horizontal-btn.activa {
            background: #2dba4e;
            color: white;
        }
        
        .config-panel {
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(10px);
            border-radius: 36px;
            padding: 20px;
            border: 2px solid #2dba4e;
        }
        
        .config-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 15px;
        }
        
        .config-card {
            background: white;
            border-radius: 28px;
            padding: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }
        
        .config-card h3 {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 18px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
        }
        
        .input-group {
            margin-bottom: 15px;
        }
        
        .input-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: #334155;
        }
        
        .input-group input, .input-group textarea, .input-group select {
            width: 100%;
            padding: 12px 16px;
            border-radius: 30px;
            border: 1px solid #cbd5e1;
            background: #f8fafc;
        }
        
        .token-row {
            display: flex;
            gap: 8px;
            align-items: center;
            background: #f1f5f9;
            padding: 4px 4px 4px 16px;
            border-radius: 50px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .token-row input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 10px 0;
            font-family: monospace;
        }
        
        .token-row button {
            background: #0d1117;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
        }
        
        .primary-btn {
            background: #2dba4e;
            border: none;
            color: white;
            padding: 12px 20px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
        }
        
        .files-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 15px;
        }
        
        .targeta-card {
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            box-shadow: 0 12px 20px -10px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.8);
            transition: transform 0.2s;
            padding: 0 0 12px 0;
        }
        
        .targeta-card:hover {
            transform: translateY(-5px);
        }
        
        .targeta-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 24px 24px 0 0;
            cursor: pointer;
        }
        
        .targeta-titulo {
            font-weight: 700;
            font-size: 1.2rem;
            margin: 12px 12px 6px;
        }
        
        .targeta-parrafo {
            color: #334155;
            font-size: 0.95rem;
            margin: 0 12px 12px;
            line-height: 1.4;
        }
        
        .card-actions {
            display: flex;
            gap: 8px;
            margin: 8px 12px 0;
            flex-wrap: wrap;
        }
        
        .card-action-btn {
            flex: 1;
            padding: 10px;
            border-radius: 30px;
            font-size: 0.9rem;
            border: none;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s;
        }
        
        .view-btn { background: #3b82f6; color: white; }
        .edit-btn { background: #f59e0b; color: white; }
        .delete-btn { background: #ef4444; color: white; }
        .doc-btn { background: #8b5cf6; color: white; }
        
        .file-card {
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 16px;
            box-shadow: 0 12px 20px -10px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        
        .file-card:hover {
            transform: translateY(-5px);
        }
        
        .empty-folder {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            color: #64748b;
            background: rgba(255,255,255,0.3);
            border-radius: 40px;
        }
        
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 60px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }
        
        .login-card h1 {
            font-size: 2.5rem;
            color: #2dba4e;
        }
        
        .login-input {
            width: 100%;
            padding: 16px 20px;
            border-radius: 50px;
            border: 2px solid #e2e8f0;
            margin-bottom: 15px;
        }
        
        .login-btn {
            background: #2dba4e;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
        }
        
        .image-modal, .edit-modal, .doc-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 10001;
            align-items: center;
            justify-content: center;
        }
        
        .edit-modal-content, .doc-modal-content {
            background: white;
            padding: 30px;
            border-radius: 50px;
            max-width: 600px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
        }
        
        .doc-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
            background: #f1f5f9;
            padding: 8px;
            border-radius: 50px;
        }
        
        .doc-tab-btn {
            flex: 1;
            padding: 10px 15px;
            border-radius: 40px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-weight: 600;
        }
        
        .doc-tab-btn.activa {
            background: #2dba4e;
            color: white;
        }
        
        .doc-tab-content {
            display: none;
            padding: 20px;
            background: #f8fafc;
            border-radius: 30px;
        }
        
        .doc-tab-content.activa {
            display: block;
        }
        
        .doc-files-list {
            margin: 15px 0;
            max-height: 200px;
            overflow-y: auto;
            background: white;
            border-radius: 20px;
            padding: 10px;
        }
        
        .doc-file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .notification {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            border-radius: 40px;
            z-index: 10003;
            font-weight: 600;
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from {
                transform: translateX(-50%) translateY(100px);
                opacity: 0;
            }
            to {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
        }
        
        .image-preview {
            width: 100%;
            min-height: 120px;
            border: 2px dashed #94a3b8;
            border-radius: 24px;
            margin: 12px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8fafc;
            overflow: hidden;
        }
        
        footer {
            text-align: center;
            margin-top: 25px;
            color: #475569;
            font-size: 0.85rem;
        }
        
        .auto-update-badge {
            display: inline-block;
            background: #2dba4e20;
            color: #1e7e34;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.8rem;
            margin-left: 10px;
            border: 1px solid #2dba4e;
        }
        
        @media (max-width: 768px) {
            .sidebar { width: 220px; }
            .sidebar.collapsed { width: 70px; }
            .files-grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #2dba4e;
        }
    </style>
</head>
<body>
<div id="loginOverlay" class="login-overlay">
    <div class="login-card">
        <h1>Cifram-LAB</h1>
        <h2>Iniciar Sesión</h2>
        <input type="text" id="loginUsername" class="login-input" placeholder="Usuario">
        <input type="password" id="loginPassword" class="login-input" placeholder="Contraseña">
        <button class="login-btn" id="loginBtn">Ingresar</button>
        <div id="loginError" style="color:red; margin-top:10px;"></div>
    </div>
</div>

<div class="app-container" id="appContainer" style="display: none;">
    <div class="sidebar" id="sidebar">
        <div class="toggle-sidebar" id="toggleSidebar">
            <i class="fas fa-chevron-left"></i>
            <span>Ocultar menú</span>
        </div>
        <div class="global-search-container">
            <i class="fas fa-search global-search-icon"></i>
            <input type="text" class="global-search-input" id="globalSearchInput" placeholder="Buscar en todos...">
            <div id="globalSearchResults" class="global-search-results"></div>
        </div>
        <div id="sidebarUserSection"></div>
        <div class="tabs-vertical" id="tabContainer"></div>
        <div id="logoutContainer"></div>
    </div>

    <div class="main-content">
        <div id="currentTabTitle" class="current-tab-title">Nuestro Equipo</div>
        <div class="search-container">
            <i class="fas fa-search search-icon"></i>
            <input type="text" class="search-input" id="searchInput" placeholder="Buscar por nombre...">
            <button class="clear-search" id="clearSearch"><i class="fas fa-times"></i></button>
        </div>
        <div id="searchStats" class="search-stats"></div>
        <div id="subTabsContainer" class="sub-tabs-horizontal" style="display: none;"></div>
        <div id="dynamicContent"></div>
        <footer>📁 Cifram-LAB · Gestor de Archivos <span class="auto-update-badge"><i class="fas fa-sync-alt"></i> Actualización automática</span></footer>
    </div>
</div>

<div id="imageModal" class="image-modal" onclick="this.style.display='none'">
    <img id="modalImage" style="max-width:90%; max-height:90%;">
</div>

<div id="editCardModal" class="edit-modal">
    <div class="edit-modal-content">
        <h3>Editar tarjeta</h3>
        <div class="input-group"><label>Título</label><input type="text" id="editCardTitle"></div>
        <div class="input-group"><label>Párrafo</label><textarea id="editCardParagraph" rows="3"></textarea></div>
        <div class="input-group"><label>Nueva imagen</label><input type="file" id="editCardImage" accept="image/*"></div>
        <div class="image-preview" id="editImagePreview"></div>
        <div style="display: flex; gap: 10px; margin-top: 15px;">
            <button class="primary-btn" id="saveEditBtn" style="flex:1;">Guardar Cambios</button>
            <button class="primary-btn" id="cancelEditBtn" style="flex:1; background:#64748b;">Cancelar</button>
        </div>
    </div>
</div>

<div id="docModal" class="doc-modal">
    <div class="doc-modal-content" id="docModalContent"></div>
</div>

<script>
(function() {
    const GITHUB_OWNER = 'cyframlab-cyber';
    const GITHUB_REPO = 'Archivos-2';
    const GITHUB_BRANCH = 'main';

    const CATEGORIAS = [
        { id: 'targeta', nombre: 'Nuestro Equipo', icono: 'fa-id-card', tieneSub: false },
        { id: 'documento1', nombre: 'Documento de Gestión', icono: 'fa-file-alt', tieneSub: true, subs: ['Apoyo', 'Estrategico', 'Claves', 'Laboratorios', 'Otros'] },
        { id: 'documento2', nombre: 'Manuales', icono: 'fa-file-alt', tieneSub: true, subs: ['Apoyo', 'Estrategico', 'Claves', 'Laboratorios', 'Otros'] },
        { id: 'documento3', nombre: 'Lista de Guías', icono: 'fa-file-alt', tieneSub: true, subs: ['Apoyo', 'Estrategico', 'Claves', 'Laboratorios', 'Otros'] },
        { id: 'documento4', nombre: 'Procedimiento', icono: 'fa-file-alt', tieneSub: true, subs: ['Apoyo', 'Estrategico', 'Claves', 'Laboratorios', 'Otros'] },
        { id: 'documento5', nombre: 'Instructivos', icono: 'fa-file-alt', tieneSub: true, subs: ['Apoyo', 'Estrategico', 'Claves', 'Laboratorios', 'Otros'] },
        { id: 'documento6', nombre: 'Formatos', icono: 'fa-file-alt', tieneSub: true, subs: ['Apoyo', 'Estrategico', 'Claves', 'Laboratorios', 'Otros'] }
    ];

    const CONFIG_TAB = { id: 'config', nombre: 'Subir Archivo', icono: 'fa-upload' };
    const ADMIN_TAB = { id: 'admin', nombre: 'Administrar Usuarios', icono: 'fa-users-cog' };
    const DOC_TABS = [
        { id: 'info', nombre: 'Información General', icono: 'fa-info-circle' },
        { id: 'especificaciones', nombre: 'Especificaciones', icono: 'fa-cogs' },
        { id: 'manuales', nombre: 'Manuales', icono: 'fa-book' },
        { id: 'recursos', nombre: 'Recursos', icono: 'fa-download' },
        { id: 'notas', nombre: 'Notas', icono: 'fa-sticky-note' }
    ];

    let currentTab = 'targeta';
    let currentSub = null;
    let archivosPorCategoria = {};
    let archivosPorTarjeta = {};
    let githubToken = localStorage.getItem('github_token') || '';
    let isAuthenticated = false;
    let currentUser = null;
    let sidebarCollapsed = localStorage.getItem('sidebarCollapsed') === 'true';
    let localSearchTerm = '';
    let globalSearchTerm = '';
    let usuarios = [];
    let tarjetasData = [];
    let currentEditingCard = null;
    let autoUpdateInterval = null;

    const appContainer = document.getElementById('appContainer');
    const loginOverlay = document.getElementById('loginOverlay');
    const loginBtn = document.getElementById('loginBtn');
    const loginUsername = document.getElementById('loginUsername');
    const loginPassword = document.getElementById('loginPassword');
    const loginError = document.getElementById('loginError');
    const sidebar = document.getElementById('sidebar');
    const toggleSidebar = document.getElementById('toggleSidebar');
    const searchInput = document.getElementById('searchInput');
    const clearSearch = document.getElementById('clearSearch');
    const searchStats = document.getElementById('searchStats');
    const globalSearchInput = document.getElementById('globalSearchInput');
    const globalSearchResults = document.getElementById('globalSearchResults');
    const dynamicContent = document.getElementById('dynamicContent');

    if (sidebarCollapsed) {
        sidebar.classList.add('collapsed');
        toggleSidebar.innerHTML = '<i class="fas fa-chevron-right"></i><span>Mostrar menú</span>';
    }

    toggleSidebar.addEventListener('click', () => {
        sidebar.classList.toggle('collapsed');
        sidebarCollapsed = sidebar.classList.contains('collapsed');
        localStorage.setItem('sidebarCollapsed', sidebarCollapsed);
        const icon = sidebarCollapsed ? 'fa-chevron-right' : 'fa-chevron-left';
        const text = sidebarCollapsed ? 'Mostrar menú' : 'Ocultar menú';
        toggleSidebar.innerHTML = `<i class="fas ${icon}"></i><span>${text}</span>`;
    });

    function showNotification(message, type) {
        const notification = document.createElement('div');
        notification.className = 'notification';
        notification.style.backgroundColor = type === 'success' ? '#2dba4e' : '#ef4444';
        notification.style.color = 'white';
        notification.innerHTML = message;
        document.body.appendChild(notification);
        setTimeout(() => notification.remove(), 3000);
    }

    async function requestGitHub(endpoint, options = {}) {
        const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}${endpoint}`;
        const headers = {
            'Accept': 'application/vnd.github.v3+json',
            ...(githubToken ? { 'Authorization': `token ${githubToken}` } : {})
        };
        const res = await fetch(url, { ...options, headers });
        if (!res.ok && res.status !== 404) {
            throw new Error(`GitHub error ${res.status}`);
        }
        return res;
    }

    async function fetchFilesInFolder(folderPath) {
        try {
            const res = await requestGitHub(`/contents/${folderPath}?ref=${GITHUB_BRANCH}`);
            if (res.status === 404) return [];
            const data = await res.json();
            if (!Array.isArray(data)) return [];
            return data.filter(item => item.type === 'file').map(f => ({
                name: f.name,
                download_url: f.download_url,
                sha: f.sha,
                path: f.path
            }));
        } catch { return []; }
    }

    async function subirArchivoAGitHub(file, folderPath) {
        if (!githubToken) {
            showNotification('❌ Se requiere token de GitHub', 'error');
            return false;
        }
        
        try {
            const reader = new FileReader();
            const contentBase64 = await new Promise((resolve) => {
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.readAsDataURL(file);
            });
            
            const path = `${folderPath}/${file.name}`;
            let sha = null;
            try {
                const res = await requestGitHub(`/contents/${path}?ref=${GITHUB_BRANCH}`);
                if (res.ok) sha = (await res.json()).sha;
            } catch { }
            
            await requestGitHub(`/contents/${path}`, {
                method: 'PUT',
                body: JSON.stringify({
                    message: `Subir archivo: ${file.name}`,
                    content: contentBase64,
                    branch: GITHUB_BRANCH,
                    ...(sha && { sha })
                })
            });
            return true;
        } catch (error) {
            console.error('Error:', error);
            return false;
        }
    }

    async function eliminarArchivoDeGitHub(path) {
        if (!githubToken) return false;
        try {
            const res = await requestGitHub(`/contents/${path}?ref=${GITHUB_BRANCH}`);
            const data = await res.json();
            await requestGitHub(`/contents/${path}`, {
                method: 'DELETE',
                body: JSON.stringify({
                    message: 'Eliminar archivo',
                    sha: data.sha,
                    branch: GITHUB_BRANCH
                })
            });
            return true;
        } catch (error) {
            console.error('Error:', error);
            return false;
        }
    }

        dynamicContent.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> Cargando archivos...</div>';
        
        const promises = [];
        CATEGORIAS.forEach(cat => {
            if (cat.tieneSub) {
                cat.subs.forEach(sub => promises.push(fetchFilesInFolder(`${cat.id}/${sub}`)));
            } else {
                promises.push(fetchFilesInFolder(cat.id));
            }
        });
        
        const results = await Promise.all(promises);
        let idx = 0;
        CATEGORIAS.forEach(cat => {
            if (cat.tieneSub) {
                archivosPorCategoria[cat.id] = {};
                cat.subs.forEach(sub => {
                    archivosPorCategoria[cat.id][sub] = results[idx++] || [];
                });
            } else {
                archivosPorCategoria[cat.id] = results[idx++] || [];
            }
        });
        
        renderCurrentView();
    }

    function filterBySearch(items, searchTerm, isTarjetas = false) {
        if (!searchTerm) return items;
        const term = searchTerm.toLowerCase();
        
        if (isTarjetas) {
            return items.filter(item => 
                item.titulo.toLowerCase().includes(term) || 
                item.parrafo.toLowerCase().includes(term) ||
                item.nombreBase.toLowerCase().includes(term)
            );
        } else {
            return items.filter(item => item.name.toLowerCase().includes(term));
        }
    }

    function performGlobalSearch() {
        const term = globalSearchTerm.toLowerCase();
        if (term.length < 2) {
            globalSearchResults.innerHTML = '';
            return;
        }

        let results = [];
        
        if (tarjetasData.length > 0) {
            const tarjetasMatch = tarjetasData.filter(t => 
                t.titulo.toLowerCase().includes(term) || 
                t.parrafo.toLowerCase().includes(term)
            );
            tarjetasMatch.forEach(t => {
                results.push({ type: 'tarjeta', name: t.titulo, location: 'Nuestro Equipo' });
            });
        }
        
        CATEGORIAS.forEach(cat => {
            if (cat.tieneSub) {
                cat.subs.forEach(sub => {
                    const files = archivosPorCategoria[cat.id]?.[sub] || [];
                    const matches = files.filter(f => f.name.toLowerCase().includes(term));
                    matches.forEach(f => {
                        results.push({ type: 'archivo', name: f.name, location: `${cat.nombre} / ${sub}` });
                    });
                });
            } else if (cat.id !== 'targeta') {
                const files = archivosPorCategoria[cat.id] || [];
                const matches = files.filter(f => f.name.toLowerCase().includes(term));
                matches.forEach(f => {
                    results.push({ type: 'archivo', name: f.name, location: cat.nombre });
                });
            }
        });
        
        if (results.length > 0) {
            let html = `<div style="font-weight:600; margin-bottom:8px;">🔍 ${results.length} resultados:</div>`;
            results.slice(0, 8).forEach(r => {
                html += `<div><i class="fas ${r.type === 'tarjeta' ? 'fa-id-card' : 'fa-file'}"></i> <strong>${escapeHtml(r.name.substring(0, 40))}</strong><br><small>📁 ${escapeHtml(r.location)}</small></div>`;
            });
            if (results.length > 8) html += `<div>... y ${results.length - 8} más</div>`;
            globalSearchResults.innerHTML = html;
        } else {
            globalSearchResults.innerHTML = '<div>❌ No se encontraron resultados</div>';
        }
    }

    async function renderPublicTab(tabId, sub = null) {
        let files = [];
        const cat = CATEGORIAS.find(c => c.id === tabId);
        
        if (cat?.tieneSub && sub) {
            files = archivosPorCategoria[tabId]?.[sub] || [];
        } else if (!cat?.tieneSub) {
            files = archivosPorCategoria[tabId] || [];
        }
        
        if (tabId === 'targeta') {
            const imagenes = files.filter(f => /\.(jpg|jpeg|png|gif|svg|webp)$/i.test(f.name) && !f.name.includes('_metadata') && !f.name.includes('orden.json'));
            const metadatos = files.filter(f => f.name.endsWith('_metadata.txt'));
            
            let tarjetasArray = [];
            for (const img of imagenes) {
                const baseName = img.name.split('.').slice(0, -1).join('.');
                const meta = metadatos.find(m => m.name.startsWith(baseName + '_metadata'));
                let titulo = 'Tarjeta', parrafo = 'Sin descripción';
                let cardId = `card_${baseName.replace(/[^a-zA-Z0-9]/g, '_')}`;
                
                if (meta) {
                    try {
                        const res = await fetch(meta.download_url + '?t=' + Date.now());
                        const texto = await res.text();
                        texto.split('\n').forEach(line => {
                            if (line.startsWith('TITULO:')) titulo = line.replace('TITULO:', '').trim();
                            if (line.startsWith('PARRAFO:')) parrafo = line.replace('PARRAFO:', '').trim();
                        });
                    } catch {}
                }
                
                tarjetasArray.push({
                    nombreBase: baseName,
                    titulo: titulo,
                    parrafo: parrafo,
                    cardId: cardId,
                    imgUrl: img.download_url,
                    imgPath: img.path,
                    metaPath: meta ? meta.path : ''
                });
            }
            
            tarjetasData = tarjetasArray;
            
            // Ordenar alfabéticamente por título
            tarjetasArray.sort((a, b) => {
                return a.titulo.localeCompare(b.titulo, 'es', { sensitivity: 'base' });
            });
            
            const filteredTarjetas = filterBySearch(tarjetasArray, localSearchTerm, true);
            searchStats.textContent = localSearchTerm ? `Mostrando ${filteredTarjetas.length} de ${tarjetasArray.length} tarjetas` : '';
            
            if (filteredTarjetas.length === 0) {
                dynamicContent.innerHTML = `<div class="empty-folder">📂 No hay tarjetas que coincidan con "${escapeHtml(localSearchTerm)}"</div>`;
                return;
            }
            
            let html = '<div class="files-grid">';
            filteredTarjetas.forEach((tarjeta) => {
                html += `
                    <div class="targeta-card">
                        <img src="${tarjeta.imgUrl}" class="targeta-img" onclick="window.mostrarImagen('${tarjeta.imgUrl}')">
                        <div class="targeta-titulo">${escapeHtml(tarjeta.titulo)}</div>
                        <div class="targeta-parrafo">${escapeHtml(tarjeta.parrafo)}</div>
                        <div class="card-actions">
                            <button class="card-action-btn doc-btn" onclick="window.mostrarDocumentacion('${tarjeta.cardId}', '${escapeHtml(tarjeta.titulo)}')">
                                <i class="fas fa-book"></i> Documentación
                            </button>
                            ${isAuthenticated && currentUser?.rol === 'admin' ? `
                                <button class="card-action-btn edit-btn" onclick="window.editarTarjeta('${tarjeta.imgPath}', '${tarjeta.metaPath}', '${escapeHtml(tarjeta.titulo)}', '${escapeHtml(tarjeta.parrafo)}')">
                                    <i class="fas fa-edit"></i> Editar
                                </button>
                                <button class="card-action-btn delete-btn" onclick="window.eliminarTarjeta('${tarjeta.imgPath}', '${tarjeta.metaPath}')">
                                    <i class="fas fa-trash"></i> Eliminar
                                </button>
                            ` : ''}
                        </div>
                    </div>
                `;
            });
            dynamicContent.innerHTML = html + '</div>';
        } else {
            const filteredFiles = filterBySearch(files, localSearchTerm, false);
            searchStats.textContent = localSearchTerm ? `Mostrando ${filteredFiles.length} de ${files.length} archivos` : '';
            
            if (filteredFiles.length === 0) {
                dynamicContent.innerHTML = `<div class="empty-folder">📂 No hay archivos que coincidan con "${escapeHtml(localSearchTerm)}"</div>`;
                return;
            }
            
            let html = '<div class="files-grid">';
            filteredFiles.forEach(f => {
                let icon = 'fa-file';
                const ext = f.name.split('.').pop().toLowerCase();
                if (['jpg','png','gif'].includes(ext)) icon = 'fa-file-image';
                else if (ext === 'pdf') icon = 'fa-file-pdf';
                
                html += `
                    <div class="file-card">
                        <i class="fas ${icon}" style="font-size:2rem; margin-bottom:8px;"></i>
                        <div style="font-weight:600; margin-bottom:10px;">${escapeHtml(f.name)}</div>
                        <div class="card-actions">
                            <button class="card-action-btn view-btn" onclick="window.open('${f.download_url}')"><i class="fas fa-eye"></i> Ver</button>
                            <a href="${f.download_url}" download class="card-action-btn download-btn"><i class="fas fa-download"></i> Descargar</a>
                            ${isAuthenticated && currentUser?.rol === 'admin' ? `<button class="card-action-btn delete-btn" onclick="window.eliminarArchivo('${f.path}')"><i class="fas fa-trash"></i> Eliminar</button>` : ''}
                        </div>
                    </div>
                `;
            });
            dynamicContent.innerHTML = html + '</div>';
        }
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function renderConfigPanel() {
        document.getElementById('subTabsContainer').style.display = 'none';
        document.getElementById('currentTabTitle').textContent = 'Subir Archivo';
        dynamicContent.innerHTML = `
            <div class="config-panel">
                <div class="token-row">
                    <input type="password" id="configToken" value="${githubToken}" placeholder="GitHub token">
                    <button id="saveTokenBtn">Guardar Token</button>
                </div>
                <div class="config-section">
                    <div class="config-card">
                        <h3><i class="fas fa-id-card"></i> Crear Tarjeta</h3>
                        <div class="input-group"><label>Título</label><input id="cardTitle"></div>
                        <div class="input-group"><label>Párrafo</label><textarea id="cardParagraph" rows="3"></textarea></div>
                        <div class="input-group"><label>Imagen</label><input type="file" id="cardImage" accept="image/*"></div>
                        <div class="image-preview" id="imagePreview"><i class="fas fa-image"></i></div>
                        <button class="primary-btn" id="createCardBtn">Crear Tarjeta</button>
                    </div>
                    <div class="config-card">
                        <h3><i class="fas fa-upload"></i> Subir Archivo</h3>
                        <div class="input-group"><label>Archivo</label><input type="file" id="uploadFile"></div>
                        <div class="input-group"><label>Carpeta</label>
                            <select id="uploadFolder">
                                ${CATEGORIAS.map(c => {
                                    if (c.tieneSub) {
                                        return c.subs.map(s => `<option value="${c.id}/${s}">${c.nombre} / ${s}</option>`).join('');
                                    } else if (c.id !== 'targeta') {
                                        return `<option value="${c.id}">${c.nombre}</option>`;
                                    }
                                    return '';
                                }).join('')}
                            </select>
                        </div>
                        <button class="primary-btn" id="uploadBtn">Subir</button>
                    </div>
                </div>
            </div>
        `;
        
        document.getElementById('saveTokenBtn').onclick = () => {
            githubToken = document.getElementById('configToken').value;
            localStorage.setItem('github_token', githubToken);
            showNotification('✅ Token guardado', 'success');
        };
        
        document.getElementById('cardImage').addEventListener('change', (e) => {
            if (e.target.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const preview = document.getElementById('imagePreview');
                    preview.innerHTML = `<img src="${e.target.result}" style="max-width:100%; max-height:200px;">`;
                };
                reader.readAsDataURL(e.target.files[0]);
            }
        });
        
        document.getElementById('createCardBtn').onclick = async () => {
            if (!githubToken) {
                showNotification('❌ Primero guarda tu token', 'error');
                return;
            }
            
            const titulo = document.getElementById('cardTitle').value.trim();
            const parrafo = document.getElementById('cardParagraph').value.trim();
            const imagen = document.getElementById('cardImage').files[0];
            
            if (!titulo || !parrafo || !imagen) {
                showNotification('❌ Completa todos los campos', 'error');
                return;
            }
            
            const nombreBase = imagen.name.split('.').slice(0, -1).join('_') + '_' + Date.now();
            const imgNombre = `${nombreBase}.${imagen.name.split('.').pop()}`;
            
            const exitoImg = await subirArchivoAGitHub(imagen, 'targeta');
            if (!exitoImg) {
                showNotification('❌ Error al subir imagen', 'error');
                return;
            }
            
            const metaContent = `TITULO: ${titulo}\nPARRAFO: ${parrafo}\nIMAGEN: ${imgNombre}`;
            const metaBlob = new Blob([metaContent], { type: 'text/plain' });
            const metaFile = new File([metaBlob], `${nombreBase}_metadata.txt`, { type: 'text/plain' });
            
            const exitoMeta = await subirArchivoAGitHub(metaFile, 'targeta');
            if (exitoMeta) {
                showNotification('✅ Tarjeta creada', 'success');
                document.getElementById('cardTitle').value = '';
                document.getElementById('cardParagraph').value = '';
                document.getElementById('cardImage').value = '';
                document.getElementById('imagePreview').innerHTML = '<i class="fas fa-image"></i>';
                await loadAllCategories();
            } else {
                showNotification('❌ Error al crear tarjeta', 'error');
            }
        };
        
        document.getElementById('uploadBtn').onclick = async () => {
            if (!githubToken) {
                showNotification('❌ Primero guarda tu token', 'error');
                return;
            }
            
            const file = document.getElementById('uploadFile').files[0];
            const folder = document.getElementById('uploadFolder').value;
            
            if (!file) {
                showNotification('❌ Selecciona un archivo', 'error');
                return;
            }
            
            const exito = await subirArchivoAGitHub(file, folder);
            if (exito) {
                showNotification('✅ Archivo subido', 'success');
                document.getElementById('uploadFile').value = '';
                await loadAllCategories();
            } else {
                showNotification('❌ Error al subir', 'error');
            }
        };
    }

    function renderAdminPanel() {
        document.getElementById('subTabsContainer').style.display = 'none';
        document.getElementById('currentTabTitle').textContent = 'Administrar Usuarios';
        dynamicContent.innerHTML = `
            <div class="config-panel admin-panel">
                <h2>Usuarios</h2>
                <div class="config-card">
                    <h3>Nuevo Usuario</h3>
                    <div class="input-group"><label>Usuario</label><input id="newUser"></div>
                    <div class="input-group"><label>Contraseña</label><input id="newPass" type="password"></div>
                    <div class="input-group"><label>Rol</label>
                        <select id="newRol">
                            <option value="usuario">Usuario</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>
                    <button class="primary-btn" id="createUserBtn">Crear</button>
                </div>
                <div class="config-card">
                    <h3>Usuarios</h3>
                    ${usuarios.map(u => `
                        <div style="padding:10px; border-bottom:1px solid #e2e8f0;">
                            <strong>${escapeHtml(u.username)}</strong> - ${u.rol}
                            ${u.username !== 'admin' ? `<button onclick="window.eliminarUsuario(${u.id})" style="float:right; background:#ef4444; color:white; border:none; padding:5px 10px; border-radius:20px;">Eliminar</button>` : ''}
                        </div>
                    `).join('')}
                </div>
            </div>
        `;
        
        document.getElementById('createUserBtn').onclick = async () => {
            const username = document.getElementById('newUser').value.trim();
            const password = document.getElementById('newPass').value;
            const rol = document.getElementById('newRol').value;
            
            if (!username || !password) {
                showNotification('❌ Completa los campos', 'error');
                return;
            }
            
            if (usuarios.some(u => u.username === username)) {
                showNotification('❌ El usuario ya existe', 'error');
                return;
            }
            
            const newId = Math.max(...usuarios.map(u => u.id), 0) + 1;
            usuarios.push({ id: newId, username, password, rol });
            
            const exito = await guardarUsuarios();
            if (exito) {
                showNotification('✅ Usuario creado', 'success');
                document.getElementById('newUser').value = '';
                document.getElementById('newPass').value = '';
                renderAdminPanel();
            } else {
                showNotification('❌ Error al crear usuario', 'error');
            }
        };
    }

    window.eliminarUsuario = async (id) => {
        if (!confirm('¿Eliminar este usuario?')) return;
        
        usuarios = usuarios.filter(u => u.id !== id);
        const exito = await guardarUsuarios();
        if (exito) {
            showNotification('✅ Usuario eliminado', 'success');
            renderAdminPanel();
        } else {
            showNotification('❌ Error al eliminar', 'error');
        }
    };

    document.getElementById('docModal')?.addEventListener('click', (e) => {
        if (e.target === document.getElementById('docModal')) {
            document.getElementById('docModal').style.display = 'none';
        }
    });
    
    document.getElementById('editCardModal')?.addEventListener('click', (e) => {
        if (e.target === document.getElementById('editCardModal')) {
            document.getElementById('editCardModal').style.display = 'none';
        }
    });

    async function init() {
        await cargarUsuarios();
        const autenticado = await checkAuth();
        if (autenticado) {
            await loadAllCategories();
            renderSidebar();
            renderSubTabs();
            document.getElementById('currentTabTitle').textContent = 'Nuestro Equipo';
        }
    }
    
    init();
})();
</script>
</body>
</html>
