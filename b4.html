<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>Archivos-2 · Subpestañas en contenido</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #f4f7fb;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        
        /* Scroll personalizado */
        .custom-scroll {
            scrollbar-width: thin;
            scrollbar-color: rgba(45, 186, 78, 0.3) transparent;
        }
        
        .custom-scroll::-webkit-scrollbar {
            width: 4px;
        }
        
        .custom-scroll::-webkit-scrollbar-track {
            background: transparent;
        }
        
        .custom-scroll::-webkit-scrollbar-thumb {
            background: rgba(45, 186, 78, 0.3);
            border-radius: 20px;
            transition: background 0.2s;
        }
        
        .custom-scroll::-webkit-scrollbar-thumb:hover {
            background: rgba(45, 186, 78, 0.6);
        }
        
        .sidebar {
            scrollbar-width: thin;
            scrollbar-color: rgba(45, 186, 78, 0.2) transparent;
        }
        
        .sidebar::-webkit-scrollbar {
            width: 3px;
        }
        
        .sidebar::-webkit-scrollbar-track {
            background: transparent;
        }
        
        .sidebar::-webkit-scrollbar-thumb {
            background: rgba(45, 186, 78, 0.2);
            border-radius: 20px;
        }
        
        .sidebar:not(:hover)::-webkit-scrollbar-thumb {
            background: transparent;
        }
        
        /* Contenedor principal */
        .app-container {
            max-width: 1400px;
            width: 100%;
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(4px);
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.12);
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.5);
            display: flex;
            gap: 20px;
            position: relative;
            min-height: 600px;
        }
        
        /* Menú lateral */
        .sidebar {
            width: 280px;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 20px 12px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.8);
            transition: all 0.3s ease;
            position: relative;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            height: fit-content;
            max-height: 80vh;
            overflow-y: auto;
            overflow-x: hidden;
        }
        
        .sidebar.collapsed {
            width: 80px;
        }
        .sidebar.collapsed .tab-btn span,
        .sidebar.collapsed .user-info span,
        .sidebar.collapsed .logout-btn span,
        .sidebar.collapsed .toggle-sidebar span {
            display: none;
        }
        .sidebar.collapsed .tab-btn i,
        .sidebar.collapsed .toggle-sidebar i {
            font-size: 1.3rem;
            margin: 0;
        }
        
        /* Botón de desplazamiento */
        .toggle-sidebar {
            position: sticky;
            top: 0;
            z-index: 101;
            width: 100%;
            margin-bottom: 15px;
            background: #2dba4e;
            color: white;
            border: 2px solid white;
            border-radius: 50px;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            box-shadow: 0 5px 10px rgba(0,0,0,0.2);
            transition: 0.2s;
            font-weight: 600;
        }
        .toggle-sidebar:hover {
            background: #24963e;
            transform: scale(1.02);
        }
        
        /* Pestañas principales en menú */
        .tabs-vertical {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin: 10px 0;
            flex: 1;
        }
        .tab-btn {
            padding: 12px 15px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.95rem;
            border: none;
            background: rgba(230, 240, 255, 0.7);
            color: #1a2639;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.6);
            width: 100%;
            text-align: left;
        }
        .tab-btn i {
            width: 24px;
            text-align: center;
            font-size: 1.1rem;
        }
        .tab-btn.activa {
            background: #ffffffcc;
            box-shadow: 0 8px 18px rgba(0,0,0,0.15);
            border: 1px solid white;
            font-weight: 700;
        }
        .tab-btn.config-tab {
            background: linear-gradient(145deg, #2dba4e, #1e7e34);
            color: white;
            border: none;
        }
        .tab-btn.admin-tab {
            background: linear-gradient(145deg, #8b5cf6, #6d28d9);
            color: white;
            border: none;
        }

        /* Sección de usuario */
        .user-section {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 15px;
            padding: 8px;
            background: #f1f5f9;
            border-radius: 50px;
            flex-wrap: wrap;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 6px;
            background: white;
            padding: 5px 12px;
            border-radius: 40px;
            flex: 1;
            font-size: 0.9rem;
        }
        .logout-btn {
            background: transparent;
            border: 2px solid #ef4444;
            color: #ef4444;
            padding: 8px 12px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
            white-space: nowrap;
            width: 100%;
            margin-top: auto;
            font-size: 0.9rem;
        }
        .login-btn-sidebar {
            background: transparent;
            border: 2px solid #2dba4e;
            color: #2dba4e;
            padding: 10px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            transition: 0.2s;
            margin-top: auto;
            font-size: 0.9rem;
        }

        /* Contenido principal */
        .main-content {
            flex: 1;
            min-width: 0;
            overflow-x: hidden;
        }

        /* Barra de búsqueda */
        .search-container {
            margin-bottom: 15px;
            position: relative;
        }
        .search-input {
            width: 100%;
            padding: 14px 20px 14px 50px;
            border-radius: 50px;
            border: 2px solid #e2e8f0;
            font-size: 1rem;
            background: white;
            transition: 0.2s;
        }
        .search-input:focus {
            outline: none;
            border-color: #2dba4e;
            box-shadow: 0 0 0 3px rgba(45, 186, 78, 0.2);
        }
        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 1.1rem;
        }
        .clear-search {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 1.1rem;
            display: none;
        }
        .search-stats {
            margin-top: 6px;
            font-size: 0.85rem;
            color: #64748b;
            padding-left: 10px;
        }

        /* Subpestañas en el contenido principal */
        .sub-tabs-horizontal {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 15px 0 20px 0;
            padding: 5px;
            background: rgba(255,255,255,0.5);
            border-radius: 50px;
            backdrop-filter: blur(5px);
        }
        .sub-tab-horizontal-btn {
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            border: none;
            background: rgba(255,255,255,0.7);
            color: #334155;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(255,255,255,0.8);
            flex: 0 1 auto;
        }
        .sub-tab-horizontal-btn i {
            font-size: 0.9rem;
        }
        .sub-tab-horizontal-btn.activa {
            background: #2dba4e;
            color: white;
            border-color: #2dba4e;
            box-shadow: 0 4px 10px rgba(45, 186, 78, 0.3);
        }
        .sub-tab-horizontal-btn:hover:not(.activa) {
            background: white;
            transform: translateY(-2px);
        }

        /* Paneles */
        .config-panel {
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(10px);
            border-radius: 36px;
            padding: 20px;
            border: 2px solid #2dba4e;
        }
        .admin-panel {
            border-color: #8b5cf6;
        }
        .config-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 15px;
        }
        .config-card {
            background: white;
            border-radius: 28px;
            padding: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }
        .config-card h3 {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 18px;
            color: #0f172a;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
            font-size: 1.2rem;
        }
        .input-group {
            margin-bottom: 15px;
        }
        .input-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: #334155;
            font-size: 0.9rem;
        }
        .input-group input, .input-group textarea, .input-group select {
            width: 100%;
            padding: 12px 16px;
            border-radius: 30px;
            border: 1px solid #cbd5e1;
            font-size: 0.95rem;
            background: #f8fafc;
        }
        
        .token-row {
            display: flex;
            gap: 8px;
            align-items: center;
            background: #f1f5f9;
            padding: 4px 4px 4px 16px;
            border-radius: 50px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .token-row input {
            flex: 1;
            min-width: 150px;
            border: none;
            background: transparent;
            padding: 10px 0;
            font-family: monospace;
            font-size: 0.9rem;
        }
        .token-row button {
            background: #0d1117;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            font-size: 0.9rem;
        }

        .image-preview {
            width: 100%;
            min-height: 120px;
            border: 2px dashed #94a3b8;
            border-radius: 24px;
            margin: 12px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8fafc;
            overflow: hidden;
        }

        .primary-btn {
            background: #2dba4e;
            border: none;
            color: white;
            padding: 12px 20px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: 0.15s;
            width: 100%;
            justify-content: center;
            margin-top: 8px;
        }

        /* Grid de archivos responsive */
        .files-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 18px;
            margin-top: 15px;
        }
        .file-card, .targeta-card {
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 16px 12px 12px;
            box-shadow: 0 12px 20px -10px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.8);
            transition: transform 0.2s;
        }
        .file-card:hover, .targeta-card:hover {
            transform: translateY(-5px);
        }
        .targeta-card {
            padding: 0 0 12px 0;
        }
        .targeta-img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 24px 24px 0 0;
            cursor: pointer;
        }
        .targeta-titulo { 
            font-weight: 700; 
            font-size: 1.2rem; 
            margin: 12px 12px 6px;
        }
        .targeta-parrafo { 
            color: #334155; 
            font-size: 0.95rem; 
            margin: 0 12px 12px;
            line-height: 1.4;
        }
        
        .card-actions {
            display: flex;
            gap: 8px;
            margin: 8px 12px 0;
            flex-wrap: wrap;
        }
        .card-action-btn {
            flex: 1;
            min-width: 80px;
            padding: 10px;
            border-radius: 30px;
            font-size: 0.9rem;
            border: none;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: 0.2s;
        }
        .view-btn {
            background: #3b82f6;
            color: white;
        }
        .view-btn:hover { background: #2563eb; }
        .download-btn {
            background: #0d1117;
            color: white;
            text-decoration: none;
        }
        .download-btn:hover { background: #1e293b; }
        .edit-btn {
            background: #f59e0b;
            color: white;
        }
        .edit-btn:hover { background: #d97706; }
        .delete-btn {
            background: #ef4444;
            color: white;
        }
        .delete-btn:hover { background: #dc2626; }

        /* Tabla responsive */
        .users-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 0.9rem;
        }
        .users-table th, .users-table td {
            padding: 10px;
            text-align: left;
        }
        .users-table th {
            background: #f1f5f9;
            border-radius: 20px 20px 0 0;
        }
        .users-table tr {
            border-bottom: 1px solid #e2e8f0;
        }
        .users-table tr:hover {
            background: #f8fafc;
        }

        .empty-folder {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            color: #64748b;
            background: rgba(255,255,255,0.3);
            border-radius: 40px;
            font-size: 1rem;
        }

        /* Responsive para móvil */
        @media (max-width: 768px) {
            body { padding: 8px; }
            .app-container {
                flex-direction: row;
                padding: 15px;
                gap: 10px;
            }
            .sidebar {
                width: 220px;
                max-height: 85vh;
            }
            .sidebar.collapsed {
                width: 70px;
            }
            .sub-tabs-horizontal {
                overflow-x: auto;
                flex-wrap: nowrap;
                padding: 8px;
                -webkit-overflow-scrolling: touch;
            }
            .sub-tab-horizontal-btn {
                white-space: nowrap;
            }
        }

        @media (max-width: 480px) {
            .sidebar {
                width: 200px;
            }
            .sidebar.collapsed {
                width: 60px;
            }
            .config-section {
                grid-template-columns: 1fr;
            }
            .token-row {
                flex-direction: column;
                align-items: stretch;
            }
            .token-row button {
                width: 100%;
            }
        }

        footer {
            text-align: center;
            margin-top: 25px;
            color: #475569;
            font-size: 0.85rem;
        }
        .auto-update-badge {
            display: inline-block;
            background: #2dba4e20;
            color: #1e7e34;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.8rem;
            margin-left: 10px;
            border: 1px solid #2dba4e;
        }

        /* Login overlay */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .login-card {
            background: white;
            padding: 30px;
            border-radius: 50px;
            max-width: 350px;
            width: 90%;
            text-align: center;
        }
        .login-card h2 {
            margin-bottom: 15px;
        }
        .login-input {
            width: 100%;
            padding: 14px;
            border-radius: 40px;
            border: 2px solid #e2e8f0;
            margin-bottom: 15px;
        }
        .login-btn {
            background: #2dba4e;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 40px;
            width: 100%;
            font-weight: 700;
            cursor: pointer;
        }
        .login-error {
            color: #dc2626;
            margin-top: 10px;
        }

        /* Modales */
        .image-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 10001;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .image-modal img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }

        .edit-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            z-index: 10000;
            align-items: center;
            justify-content: center;
        }
        .edit-modal-content {
            background: white;
            padding: 30px;
            border-radius: 50px;
            max-width: 450px;
            width: 90%;
        }
    </style>
</head>
<body>
<div class="app-container" id="appContainer">
    <!-- Menú lateral -->
    <div class="sidebar custom-scroll" id="sidebar">
        <!-- Botón de desplazamiento -->
        <div class="toggle-sidebar" id="toggleSidebar">
            <i class="fas fa-chevron-left"></i>
            <span id="toggleText">Ocultar menú</span>
        </div>
        
        <div id="sidebarUserSection"></div>
        
        <!-- Solo pestañas principales en el menú -->
        <div class="tabs-vertical" id="tabContainer"></div>
        
        <div id="logoutContainer"></div>
    </div>

    <!-- Contenido principal -->
    <div class="main-content">
        <div class="search-container">
            <i class="fas fa-search search-icon"></i>
            <input type="text" class="search-input" id="searchInput" placeholder="Buscar archivos...">
            <button class="clear-search" id="clearSearch"><i class="fas fa-times"></i></button>
        </div>
        <div id="searchStats" class="search-stats"></div>
        
        <!-- Contenedor para subpestañas horizontales -->
        <div id="subTabsContainer" class="sub-tabs-horizontal" style="display: none;"></div>
        
        <div id="dynamicContent"></div>
        <footer>📁 Actualización automática · <span id="updateCounter">0</span> online<span class="auto-update-badge"><i class="fas fa-sync-alt fa-spin"></i> live</span></footer>
    </div>
</div>

<!-- Login overlay -->
<div id="loginOverlay" class="login-overlay" style="display: none;">
    <div class="login-card">
        <h2>🔐 Acceso</h2>
        <input type="text" id="loginUsername" class="login-input" placeholder="Usuario">
        <input type="password" id="loginPassword" class="login-input" placeholder="Contraseña">
        <button class="login-btn" id="loginBtn">Iniciar sesión</button>
        <div id="loginError" class="login-error"></div>
    </div>
</div>

<!-- Modal para ver imagen grande -->
<div id="imageModal" class="image-modal" onclick="this.style.display='none'">
    <img id="modalImage" src="" alt="Imagen ampliada">
</div>

<!-- Modal para editar tarjeta -->
<div id="editCardModal" class="edit-modal">
    <div class="edit-modal-content">
        <h3 style="margin-bottom: 15px;"><i class="fas fa-edit"></i> Editar tarjeta</h3>
        <div class="input-group">
            <label>Título</label>
            <input type="text" id="editCardTitle">
        </div>
        <div class="input-group">
            <label>Párrafo</label>
            <textarea id="editCardParagraph" rows="3"></textarea>
        </div>
        <div class="input-group">
            <label>Nueva imagen (opcional)</label>
            <input type="file" id="editCardImage" accept="image/*">
        </div>
        <div style="display: flex; gap: 8px; margin-top: 15px;">
            <button class="primary-btn" id="saveEditBtn" style="flex:1;">Guardar</button>
            <button class="delete-btn" id="cancelEditBtn" style="flex:1; background:#64748b; border:none;">Cancelar</button>
        </div>
    </div>
</div>

<script>
    (function() {
        const GITHUB_OWNER = 'cyframlab-cyber';
        const GITHUB_REPO = 'Archivos-2';
        const GITHUB_BRANCH = 'main';

        // Categorías con 5 subcarpetas
        const CATEGORIAS = [
            { id: 'targeta', nombre: 'Targeta', icono: 'fa-id-card', tieneSub: false },
            { id: 'documento1', nombre: 'Documento 1', icono: 'fa-file-alt', tieneSub: true, subs: ['Sub1', 'Sub2', 'Sub3', 'Sub4', 'Sub5'] },
            { id: 'documento2', nombre: 'Documento 2', icono: 'fa-file-pdf', tieneSub: true, subs: ['Sub1', 'Sub2', 'Sub3', 'Sub4', 'Sub5'] },
            { id: 'documento3', nombre: 'Documento 3', icono: 'fa-file-word', tieneSub: true, subs: ['Sub1', 'Sub2', 'Sub3', 'Sub4', 'Sub5'] },
            { id: 'documento4', nombre: 'Documento 4', icono: 'fa-file-archive', tieneSub: true, subs: ['Sub1', 'Sub2', 'Sub3', 'Sub4', 'Sub5'] }
        ];

        const CONFIG_TAB = { id: 'config', nombre: 'Subir Archivo', icono: 'fa-upload' };
        const ADMIN_TAB = { id: 'admin', nombre: 'Administrar Usuarios', icono: 'fa-users-cog' };

        // Estado
        let currentTab = 'targeta';
        let currentSub = null;
        let archivosPorCategoria = {};
        let githubToken = localStorage.getItem('github_token') || '';
        let isAuthenticated = false;
        let currentUser = null;
        let sidebarCollapsed = localStorage.getItem('sidebarCollapsed') === 'true';
        let searchTerm = '';
        let usuarios = [];

        // Referencias DOM
        const sidebar = document.getElementById('sidebar');
        const toggleSidebar = document.getElementById('toggleSidebar');
        const toggleText = document.getElementById('toggleText');
        const sidebarUserSection = document.getElementById('sidebarUserSection');
        const logoutContainer = document.getElementById('logoutContainer');
        const tabContainer = document.getElementById('tabContainer');
        const subTabsContainer = document.getElementById('subTabsContainer');
        const dynamicContent = document.getElementById('dynamicContent');

        const clearSearch = document.getElementById('clearSearch');

        // Función para colapsar menú después de hacer clic
        function collapseMenuAfterClick() {
            if (!sidebarCollapsed) {
                sidebar.classList.add('collapsed');
                sidebarCollapsed = true;
                localStorage.setItem('sidebarCollapsed', true);
                toggleSidebar.innerHTML = '<i class="fas fa-chevron-right"></i>';
                toggleText.textContent = 'Mostrar menú';
            }
        }

        // Sidebar
        if (sidebarCollapsed) {
            sidebar.classList.add('collapsed');
            toggleSidebar.innerHTML = '<i class="fas fa-chevron-right"></i>';
            toggleText.textContent = 'Mostrar menú';
        }

        toggleSidebar.addEventListener('click', () => {
            sidebar.classList.toggle('collapsed');
            sidebarCollapsed = sidebar.classList.contains('collapsed');
            localStorage.setItem('sidebarCollapsed', sidebarCollapsed);
            toggleSidebar.innerHTML = sidebarCollapsed ? 
                '<i class="fas fa-chevron-right"></i>' : 
                '<i class="fas fa-chevron-left"></i>';
            toggleText.textContent = sidebarCollapsed ? 'Mostrar menú' : 'Ocultar menú';
        });

        window.mostrarImagen = (url) => {
            modalImage.src = url;
            document.getElementById('imageModal').style.display = 'flex';
        };

        // Búsqueda
        function filterFiles(files) {
            if (!searchTerm) return files;
            const term = searchTerm.toLowerCase();
            return files.filter(f => f.name.toLowerCase().includes(term));
        }

        searchInput.addEventListener('input', (e) => {
            searchTerm = e.target.value;
            if (![CONFIG_TAB.id, ADMIN_TAB.id].includes(currentTab)) {
                renderPublicTab(currentTab, currentSub);
            }
        });

        clearSearch.addEventListener('click', () => {
            searchInput.value = '';
            searchTerm = '';
            if (![CONFIG_TAB.id, ADMIN_TAB.id].includes(currentTab)) {
                renderPublicTab(currentTab, currentSub);
            }
        });

        // GitHub functions
        async function requestGitHub(endpoint, options = {}) {
            const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}${endpoint}`;
            const headers = {
                'Accept': 'application/vnd.github.v3+json',
                ...(githubToken ? { 'Authorization': `token ${githubToken}` } : {})
            };
            const res = await fetch(url, { ...options, headers });
            if (!res.ok && res.status !== 404) throw new Error(`GitHub error ${res.status}`);
            return res;
        }

        async function fetchFilesInFolder(folderPath) {
            try {
                const res = await requestGitHub(`/contents/${folderPath}?ref=${GITHUB_BRANCH}`);
                if (res.status === 404) return [];
                const data = await res.json();
                if (!Array.isArray(data)) return [];
                return data.filter(item => item.type === 'file').map(f => ({
                    name: f.name,
                    download_url: f.download_url,
                    sha: f.sha,
                    path: f.path
                }));
            } catch { return []; }
        }

        async function loadAllCategories() {
            const promises = [];
            CATEGORIAS.forEach(cat => {
                if (cat.tieneSub) {
                    cat.subs.forEach(sub => {
                        promises.push(fetchFilesInFolder(`${cat.id}/${sub}`));
                    });
                } else {
                    promises.push(fetchFilesInFolder(cat.id));
                }
            });
            
            const results = await Promise.all(promises);
            let idx = 0;
            CATEGORIAS.forEach(cat => {
                if (cat.tieneSub) {
                    archivosPorCategoria[cat.id] = {};
                    cat.subs.forEach(sub => {
                        archivosPorCategoria[cat.id][sub] = results[idx++] || [];
                    });
                } else {
                    archivosPorCategoria[cat.id] = results[idx++] || [];
                }
            });
            
            if (![CONFIG_TAB.id, ADMIN_TAB.id].includes(currentTab)) {
                renderPublicTab(currentTab, currentSub);
            }
            updateCounter.textContent = Math.floor(Math.random() * 5) + 3;
        }

        // Usuarios
        async function cargarUsuarios() {
            try {
                const files = await fetchFilesInFolder('usuarios');
                const usuarioFile = files.find(f => f.name === 'usuarios.json');
                if (usuarioFile) {
                    const res = await fetch(usuarioFile.download_url);
                    usuarios = await res.json();
                } else {
                    usuarios = [{ id: 1, username: 'admin', password: 'admin123', rol: 'admin' }];
                    await guardarUsuarios();
                }
            } catch {
                usuarios = [{ id: 1, username: 'admin', password: 'admin123', rol: 'admin' }];
            }
        }

        async function guardarUsuarios() {
            if (!githubToken) return false;
            const content = btoa(unescape(encodeURIComponent(JSON.stringify(usuarios))));
            let sha = null;
            try {
                const res = await requestGitHub(`/contents/usuarios/usuarios.json?ref=${GITHUB_BRANCH}`);
                if (res.ok) sha = (await res.json()).sha;
            } catch { }
            try {
                await requestGitHub(`/contents/usuarios/usuarios.json`, {
                    method: 'PUT',
                    body: JSON.stringify({
                        message: 'Actualizar usuarios',
                        content: content,
                        branch: GITHUB_BRANCH,
                        ...(sha && { sha })
                    })
                });
                return true;
            } catch { return false; }
        }

        // Auth
        async function checkAuth() {
            const savedAuth = localStorage.getItem('auth');
            if (savedAuth) {
                const { username, timestamp } = JSON.parse(savedAuth);
                if (Date.now() - timestamp < 24 * 60 * 60 * 1000) {
                    const user = usuarios.find(u => u.username === username);
                    if (user) {
                        isAuthenticated = true;
                        currentUser = user;
                    }
                }
            }
            renderSidebar();
        }

        function renderSidebar() {
            // User section
            if (isAuthenticated) {
                sidebarUserSection.innerHTML = `
                    <div class="user-section">
                        <div class="user-info">
                            <i class="fas fa-user-circle"></i>
                            <span>${currentUser.username}</span>
                            <span style="font-size:0.75rem;">(${currentUser.rol === 'admin' ? 'Admin' : 'User'})</span>
                        </div>
                    </div>
                `;
                logoutContainer.innerHTML = `
                    <button class="logout-btn" id="logoutBtn">
                        <i class="fas fa-sign-out-alt"></i>
                        <span>Salir</span>
                    </button>
                `;
            } else {
                sidebarUserSection.innerHTML = `
                    <button class="login-btn-sidebar" id="showLoginBtn">
                        <i class="fas fa-sign-in-alt"></i>
                        <span>Iniciar sesión</span>
                    </button>
                `;
                logoutContainer.innerHTML = '';
            }

            // Solo pestañas principales en el menú (sin subpestañas)
            let tabsHtml = '';
            CATEGORIAS.forEach(cat => {
                const activa = (currentTab === cat.id) ? 'activa' : '';
                tabsHtml += `<button class="tab-btn ${activa}" data-tab="${cat.id}">
                    <i class="fas ${cat.icono}"></i>
                    <span>${cat.nombre}</span>
                </button>`;
            });
            
            if (isAuthenticated && currentUser?.rol === 'admin') {
                tabsHtml += `<button class="tab-btn config-tab ${currentTab === CONFIG_TAB.id ? 'activa' : ''}" data-tab="${CONFIG_TAB.id}">
                    <i class="fas ${CONFIG_TAB.icono}"></i>
                    <span>${CONFIG_TAB.nombre}</span>
                </button>`;
                tabsHtml += `<button class="tab-btn admin-tab ${currentTab === ADMIN_TAB.id ? 'activa' : ''}" data-tab="${ADMIN_TAB.id}">
                    <i class="fas ${ADMIN_TAB.icono}"></i>
                    <span>${ADMIN_TAB.nombre}</span>
                </button>`;
            }
            
            tabContainer.innerHTML = tabsHtml;

            // Eventos para pestañas principales
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const newTab = btn.dataset.tab;
                    if (newTab === CONFIG_TAB.id || newTab === ADMIN_TAB.id) {
                        currentTab = newTab;
                        currentSub = null;
                    } else {
                        const cat = CATEGORIAS.find(c => c.id === newTab);
                        currentTab = newTab;
                        // Si la pestaña tiene subcarpetas, seleccionar la primera por defecto
                        if (cat.tieneSub) {
                            currentSub = cat.subs[0];
                        } else {
                            currentSub = null;
                        }
                    }
                    renderSidebar();
                    renderSubTabs();
                    if (currentTab === CONFIG_TAB.id) renderConfigPanel();
                    else if (currentTab === ADMIN_TAB.id) renderAdminPanel();
                    else renderPublicTab(currentTab, currentSub);
                    
                    // Cerrar menú después de hacer clic
                    collapseMenuAfterClick();
                });
            });

            // Evento para logout
            document.getElementById('logoutBtn')?.addEventListener('click', () => {
                isAuthenticated = false;
                currentUser = null;
                localStorage.removeItem('auth');
                checkAuth();
                collapseMenuAfterClick();
            });

            // Evento para login
            document.getElementById('showLoginBtn')?.addEventListener('click', () => {
                loginOverlay.style.display = 'flex';
                collapseMenuAfterClick();
            });
        }

        // Renderizar subpestañas horizontales en el contenido principal
        function renderSubTabs() {
            const cat = CATEGORIAS.find(c => c.id === currentTab);
            
            if (!cat || !cat.tieneSub || currentTab === CONFIG_TAB.id || currentTab === ADMIN_TAB.id) {
                subTabsContainer.style.display = 'none';
                return;
            }

            let html = '';
            cat.subs.forEach(sub => {
                const activa = (currentSub === sub) ? 'activa' : '';
                html += `<button class="sub-tab-horizontal-btn ${activa}" data-sub="${sub}">
                    <i class="fas fa-folder"></i>
                    <span>${sub}</span>
                </button>`;
            });

            subTabsContainer.innerHTML = html;
            subTabsContainer.style.display = 'flex';

            // Eventos para subpestañas
            document.querySelectorAll('.sub-tab-horizontal-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    currentSub = btn.dataset.sub;
                    renderSubTabs();
                    renderPublicTab(currentTab, currentSub);
                });
            });
        }

        loginBtn.addEventListener('click', async () => {
            const user = loginUsername.value.trim();
            const pass = loginPassword.value.trim();
            const found = usuarios.find(u => u.username === user && u.password === pass);
            if (found) {
                isAuthenticated = true;
                currentUser = found;
                localStorage.setItem('auth', JSON.stringify({ username: user, timestamp: Date.now() }));
                loginOverlay.style.display = 'none';
                checkAuth();
            } else {
                loginError.textContent = '❌ Credenciales incorrectas';
            }
        });

        // Render público
        async function renderPublicTab(tabId, sub = null) {
            let files = [];
            const cat = CATEGORIAS.find(c => c.id === tabId);
            
            if (cat.tieneSub && sub) {
                files = archivosPorCategoria[tabId]?.[sub] || [];
            } else if (!cat.tieneSub) {
                files = archivosPorCategoria[tabId] || [];
            }

            const filtered = filterFiles(files);
            searchStats.textContent = searchTerm ? `Mostrando ${filtered.length} de ${files.length}` : '';
            clearSearch.style.display = searchTerm ? 'block' : 'none';

            if (filtered.length === 0) {
                dynamicContent.innerHTML = `<div class="empty-folder">📂 No hay archivos</div>`;
                return;
            }

            if (tabId === 'targeta') {
                const imagenes = filtered.filter(f => /\.(jpg|jpeg|png|gif|svg|webp)$/i.test(f.name));
                const metadatos = files.filter(f => f.name.endsWith('_metadata.txt'));
                let html = '<div class="files-grid">';
                
                for (const img of imagenes) {
                    const baseName = img.name.split('.').slice(0, -1).join('.');
                    const meta = metadatos.find(m => m.name.startsWith(baseName + '_metadata'));
                    let titulo = 'Tarjeta', parrafo = 'Sin descripción';
                    
                    if (meta) {
                        try {
                            const res = await fetch(meta.download_url);
                            const texto = await res.text();
                            texto.split('\n').forEach(line => {
                                if (line.startsWith('TITULO:')) titulo = line.replace('TITULO:', '').trim();
                                if (line.startsWith('PARRAFO:')) parrafo = line.replace('PARRAFO:', '').trim();
                            });
                        } catch {}
                    }
                    
                    html += `
                        <div class="targeta-card">
                            <img src="${img.download_url}" class="targeta-img" onclick="mostrarImagen('${img.download_url}')">
                            <div class="targeta-titulo">${titulo}</div>
                            <div class="targeta-parrafo">${parrafo}</div>
                            ${isAuthenticated && currentUser?.rol === 'admin' ? `
                                <div class="card-actions">
                                    <button class="card-action-btn edit-btn" onclick="editarTarjeta('${img.path}', '${meta ? meta.path : ''}', '${titulo}', '${parrafo}')">
                                        <i class="fas fa-edit"></i> Editar
                                    </button>
                                    <button class="card-action-btn delete-btn" onclick="eliminarTarjeta('${img.path}', '${meta ? meta.path : ''}')">
                                        <i class="fas fa-trash"></i> Eliminar
                                    </button>
                                </div>
                            ` : ''}
                        </div>
                    `;
                }
                dynamicContent.innerHTML = html + '</div>';
            } else {
                let html = '<div class="files-grid">';
                filtered.forEach(f => {
                    let icon = 'fa-file';
                    const ext = f.name.split('.').pop().toLowerCase();
                    if (['jpg','png','gif'].includes(ext)) icon = 'fa-file-image';
                    else if (ext === 'pdf') icon = 'fa-file-pdf';
                    
                    html += `
                        <div class="file-card">
                            <i class="fas ${icon}" style="font-size:2rem; margin-bottom:8px;"></i>
                            <div style="font-weight:600; margin-bottom:10px; word-break:break-word;">${f.name}</div>
                            <div class="card-actions">
                                <button class="card-action-btn view-btn" onclick="window.open('${f.download_url}')">
                                    <i class="fas fa-eye"></i> Ver
                                </button>
                                <a href="${f.download_url}" download class="card-action-btn download-btn">
                                    <i class="fas fa-download"></i> Descargar
                                </a>
                                ${isAuthenticated && currentUser?.rol === 'admin' ? `
                                    <button class="card-action-btn delete-btn" onclick="eliminarArchivo('${f.path}')">
                                        <i class="fas fa-trash"></i> Eliminar
                                    </button>
                                ` : ''}
                            </div>
                        </div>
                    `;
                });
                dynamicContent.innerHTML = html + '</div>';
            }
        }

        // Acciones
        window.editarTarjeta = (imgPath, metaPath, titulo, parrafo) => {
            window.tarjetaEnEdicion = { imgPath, metaPath, titulo, parrafo };
            document.getElementById('editCardTitle').value = titulo;
            document.getElementById('editCardParagraph').value = parrafo;
            editModal.style.display = 'flex';
        };

        window.eliminarTarjeta = async (imgPath, metaPath) => {
            if (!confirm('¿Eliminar tarjeta?')) return;
            if (metaPath) await deleteFile(metaPath);
            await deleteFile(imgPath);
            loadAllCategories();
        };

        window.eliminarArchivo = async (path) => {
            if (!confirm('¿Eliminar archivo?')) return;
            await deleteFile(path);
            loadAllCategories();
        };

        async function deleteFile(path) {
            if (!githubToken) return alert('Token requerido');
            try {
                const res = await requestGitHub(`/contents/${path}?ref=${GITHUB_BRANCH}`);
                const data = await res.json();
                await requestGitHub(`/contents/${path}`, {
                    method: 'DELETE',
                    body: JSON.stringify({
                        message: 'Eliminar',
                        sha: data.sha,
                        branch: GITHUB_BRANCH
                    })
                });
                return true;
            } catch (e) {
                alert('Error: ' + e.message);
                return false;
            }
        }

        document.getElementById('saveEditBtn').addEventListener('click', async () => {
            const e = window.tarjetaEnEdicion;
            if (!e) return;
            const titulo = document.getElementById('editCardTitle').value;
            const parrafo = document.getElementById('editCardParagraph').value;
            const imagen = document.getElementById('editCardImage').files[0];
            
            const metaContent = `TITULO: ${titulo}\nPARRAFO: ${parrafo}\nIMAGEN: ${imagen ? imagen.name : e.imgPath.split('/').pop()}`;
            const metaFile = new File([metaContent], e.metaPath.split('/').pop(), { type: 'text/plain' });
            
            const reader = new FileReader();
            reader.onload = async () => {
                const base64 = reader.result.split(',')[1];
                let sha = null;
                try {
                    const res = await requestGitHub(`/contents/${e.metaPath}?ref=${GITHUB_BRANCH}`);
                    if (res.ok) sha = (await res.json()).sha;
                } catch {}
                await requestGitHub(`/contents/${e.metaPath}`, {
                    method: 'PUT',
                    body: JSON.stringify({
                        message: 'Actualizar metadata',
                        content: base64,
                        branch: GITHUB_BRANCH,
                        ...(sha && { sha })
                    })
                });
                
                if (imagen) {
                    const imgReader = new FileReader();
                    imgReader.onload = async () => {
                        const imgBase64 = imgReader.result.split(',')[1];
                        let imgSha = null;
                        try {
                            const res = await requestGitHub(`/contents/${e.imgPath}?ref=${GITHUB_BRANCH}`);
                            if (res.ok) imgSha = (await res.json()).sha;
                        } catch {}
                        await requestGitHub(`/contents/${e.imgPath}`, {
                            method: 'PUT',
                            body: JSON.stringify({
                                message: 'Actualizar imagen',
                                content: imgBase64,
                                branch: GITHUB_BRANCH,
                                ...(imgSha && { sha: imgSha })
                            })
                        });
                    };
                    imgReader.readAsDataURL(imagen);
                }
                
                editModal.style.display = 'none';
                loadAllCategories();
            };
            reader.readAsDataURL(metaFile);
        });

        document.getElementById('cancelEditBtn').addEventListener('click', () => {
            editModal.style.display = 'none';
        });

        function renderConfigPanel() {

            let html = `
                <div class="config-panel">
                    <div class="token-row">
                        <input type="password" id="configToken" value="${githubToken}" placeholder="GitHub token">

                const imagen = document.getElementById('cardImage').files[0];
                if (!titulo || !parrafo || !imagen) return alert('Completa todo');
                
                const imgBase64 = await new Promise(r => {

                    reader.readAsDataURL(imagen);
                });
                
                const imgPath = `targeta/${imagen.name}`;
                let imgSha;
                try {
                    const res = await requestGitHub(`/contents/${imgPath}?ref=${GITHUB_BRANCH}`);
                    if (res.ok) imgSha = (await res.json()).sha;

                await requestGitHub(`/contents/${imgPath}`, {

                    body: JSON.stringify({
                        message: 'Subir imagen',
                        content: imgBase64,
                        branch: GITHUB_BRANCH,
                        ...(imgSha && { sha: imgSha })
                    })

                const nombreBase = imagen.name.split('.').slice(0,-1).join('.');
                const metaContent = `TITULO: ${titulo}\nPARRAFO: ${parrafo}\nIMAGEN: ${imagen.name}`;
                const metaBase64 = btoa(unescape(encodeURIComponent(metaContent)));
                const metaPath = `targeta/${nombreBase}_metadata.txt`;

                    const res = await requestGitHub(`/contents/${metaPath}?ref=${GITHUB_BRANCH}`);
                    if (res.ok) metaSha = (await res.json()).sha;
                } catch {}
                
                await requestGitHub(`/contents/${metaPath}`, {
                    method: 'PUT',
                    body: JSON.stringify({
                        message: 'Subir metadata',
                        content: metaBase64,
                        branch: GITHUB_BRANCH,
                        ...(metaSha && { sha: metaSha })

                        const res = await requestGitHub(`/contents/${path}?ref=${GITHUB_BRANCH}`);

                    } catch {}
                    
                    await requestGitHub(`/contents/${path}`, {
                        method: 'PUT',
                        body: JSON.stringify({
                            message: 'Subir archivo',
                            content: base64,
                            branch: GITHUB_BRANCH,
                            ...(sha && { sha })
                        })

                    alert('✅ Subido');
                    loadAllCategories();
                };
                reader.readAsDataURL(file);
            };
        }

        // Panel admin
        function renderAdminPanel() {
            subTabsContainer.style.display = 'none';
            let html = `

                    <h2><i class="fas fa-users-cog"></i> Usuarios</h2>
                    <div class="config-card">

                        <div class="input-group"><label>Usuario</label><input id="newUser"></div>
                        <div class="input-group"><label>Contraseña</label><input id="newPass"></div>
                        <div class="input-group"><label>Rol</label>

                    </div>
                    <div class="config-card">
                        <h3>Lista</h3>
                        <table class="users-table">
                            <tr><th>ID</th><th>Usuario</th><th>Rol</th><th></th></tr>
                            ${usuarios.map(u => `
                                <tr>
                                    <td>${u.id}</td>
                                    <td>${u.username}</td>
                                    <td>${u.rol}</td>
                                    <td>
                                        ${u.username !== 'admin' ? `<button onclick="eliminarUsuario(${u.id})" style="background:#ef4444; color:white; padding:5px 10px; border:none; border-radius:20px;"><i class="fas fa-trash"></i></button>` : ''}
                                    </td>
                                </tr>
                            `).join('')}
                        </table>
                    </div>
                </div>
            `;
            dynamicContent.innerHTML = html;

            document.getElementById('createUserBtn').onclick = async () => {
                const username = document.getElementById('newUser').value;
                const password = document.getElementById('newPass').value;
                const rol = document.getElementById('newRol').value;
                if (!username || !password) return alert('Completa');
                if (usuarios.some(u => u.username === username)) return alert('Ya existe');
                
                const newId = Math.max(...usuarios.map(u => u.id)) + 1;
                usuarios.push({ id: newId, username, password, rol });
                await guardarUsuarios();
                renderAdminPanel();
            };
        }

        window.eliminarUsuario = async (id) => {
            if (!confirm('¿Eliminar usuario?')) return;
            usuarios = usuarios.filter(u => u.id !== id);
            await guardarUsuarios();
            renderAdminPanel();
        };

        // Init
        async function init() {
            await cargarUsuarios();
            await loadAllCategories();
            await checkAuth();
            renderSidebar();
            renderSubTabs();
            renderPublicTab('targeta');
        }
        init();
    })();
</script>
</body>
</html>
